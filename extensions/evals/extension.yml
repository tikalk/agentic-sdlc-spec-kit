schema_version: "1.0"

extension:
  id: "evals"
  name: "Evals - EDD (Eval-Driven Development) with PromptFoo Integration"
  version: "1.0.0"
  description: "Build evaluation systems following EDD (Eval-Driven Development) principles, integrating with PromptFoo for eval execution and annotation"
  author: "Agentic SDLC Team"
  repository: "https://github.com/tikalk/agentic-sdlc-spec-kit"
  license: "MIT"
  homepage: "https://github.com/tikalk/agentic-sdlc-spec-kit/tree/main/extensions/evals"

requires:
  speckit_version: ">=0.0.80"
  tools:
    - name: "git"
      required: true
      version: ">=2.0.0"
    - name: "promptfoo"
      required: false
      version: ">=0.60.0"
      description: "Required for PromptFoo integration"

provides:
  commands:
    # Initialize evals directory structure
    - name: "adlc.evals.init"
      file: "commands/init.md"
      description: "Initialize evals/{system}/ directory structure for evaluation system"
      aliases: ["evals.init"]

    # Bottom-up goldset definition from human error analysis
    - name: "adlc.evals.specify"
      file: "commands/specify.md"
      description: "Bottom-up goldset definition from human error analysis → drafts/"
      aliases: ["evals.specify"]

    # Axial coding + accept drafts → goldset.md + goldset.json
    - name: "adlc.evals.clarify"
      file: "commands/clarify.md"
      description: "Axial coding + accept drafts → goldset.md + goldset.json"
      aliases: ["evals.clarify"]

    # Re-code + quantify + saturation + adversarial check + holdout split
    - name: "adlc.evals.analyze"
      file: "commands/analyze.md"
      description: "Re-code + quantify + saturation + adversarial check + holdout split"
      aliases: ["evals.analyze"]

    # Match published evals to feature tasks → [EVAL] markers
    - name: "adlc.evals.tasks"
      file: "commands/tasks.md"
      description: "Match published evals to feature tasks → [EVAL] markers"
      aliases: ["evals.tasks"]

    # Generate PromptFoo config + graders from goldset
    - name: "adlc.evals.implement"
      file: "commands/implement.md"
      description: "Generate PromptFoo config + graders from goldset"
      aliases: ["evals.implement"]

    # TPR/TNR + goldset quality + PromptFoo pass rate thresholds
    - name: "adlc.evals.validate"
      file: "commands/validate.md"
      description: "TPR/TNR + goldset quality + PromptFoo pass rate thresholds"
      aliases: ["evals.validate"]

    # Scan evals/results/ + annotation queue → PR to team-ai-directives
    - name: "adlc.evals.levelup"
      file: "commands/levelup.md"
      description: "Scan evals/results/ + annotation queue → PR to team-ai-directives"
      aliases: ["evals.levelup"]

  config:
    - name: "evals-config.yml"
      template: "config-template.yml"
      description: "Evals extension configuration"
      required: false

# Handoffs between commands (ADR/CDR Pattern)
handoffs:
  evals.init:
    - label: "Start Error Analysis"
      agent: "evals.specify"
      prompt: "Begin bottom-up goldset definition from human error analysis"
      send: true

  evals.specify:
    - label: "Clarify Eval Criteria"
      agent: "evals.clarify"
      prompt: "Apply axial coding to cluster notes into failure modes and accept drafts"
      send: true

  evals.clarify:
    - label: "Analyze Goldset"
      agent: "evals.analyze"
      prompt: "Quantify, check saturation, add adversarial inputs, and create holdout split"
      send: true

  evals.analyze:
    - label: "Implement Evaluators"
      agent: "evals.implement"
      prompt: "Generate PromptFoo config and graders from finalized goldset"
      send: true
    - label: "Mark Feature Tasks"
      agent: "evals.tasks"
      prompt: "Match published evals to feature tasks and add [EVAL] markers"
      send: false

  evals.implement:
    - label: "Validate Eval System"
      agent: "evals.validate"
      prompt: "Check TPR/TNR and goldset quality thresholds"
      send: true

  evals.validate:
    - label: "Level Up Team"
      agent: "evals.levelup"
      prompt: "Scan results and create PR to team-ai-directives with insights"
      send: false

  evals.tasks:
    - label: "Validate Task Coverage"
      agent: "evals.validate"
      prompt: "Validate eval coverage across marked tasks"
      send: false

tags:
   - "evaluation"
   - "edd"
   - "eval-driven-development"
   - "promptfoo"
   - "testing"
   - "quality"
   - "goldset"
   - "binary-pass-fail"
   - "error-analysis"

# Hooks triggered at workflow stage boundaries
hooks:
  after_tasks:
    command: "adlc.evals.tasks"
    description: "Match published evals to feature tasks → [EVAL] markers"
  after_implement:
    command: "adlc.evals.implement"
    description: "Generate PromptFoo config + graders from goldset"

defaults:
  system: "promptfoo"  # promptfoo | custom | llm-judge

  # File locations
  drafts_location: ".specify/drafts/"
  goldset_location: "evals/{system}/goldset.md"
  config_location: "evals/{system}/config.yml"

  # EDD Principle settings
  evaluation_pyramid:
    tier1_fast_checks: true     # Security baseline + deterministic graders
    tier2_goldset_judges: true  # LLM judges on version-controlled goldset

  binary_pass_fail: true       # EDD Principle II: No Likert scales

  # Error analysis settings
  error_analysis:
    theoretical_saturation_required: true
    min_traces_analyzed: 20

  # Test data hygiene (EDD Principle IX)
  test_data:
    adversarial_required: true
    holdout_ratio: 0.2

  # Annotation integration
  annotation:
    high_risk_routing: true
    binary_human_review: true

# Goldset Lifecycle (ADR/CDR Pattern):
# 1. init → initialize directory structure
# 2. specify → bottom-up error analysis (drafts)
# 3. clarify → axial coding (goldset.md + goldset.json)
# 4. analyze → quantify + saturation + adversarial + holdout
# 5. implement → PromptFoo config + graders (after_implement hook)
# 6. tasks → [EVAL] markers (after_tasks hook)
# 7. validate → TPR/TNR + quality thresholds
# 8. levelup → results scan + annotation queue + PR