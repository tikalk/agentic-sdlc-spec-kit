schema_version: "1.0"

extension:
  id: "evals"
  name: "Evals - EDD (Eval-Driven Development) with PromptFoo & DeepEval Integration"
  version: "1.1.0"
  description: "Build evaluation systems following EDD (Eval-Driven Development) principles, with flexible integration for either PromptFoo or DeepEval execution and annotation"
  author: "Agentic SDLC Team"
  repository: "https://github.com/tikalk/agentic-sdlc-spec-kit"
  license: "MIT"
  homepage: "https://github.com/tikalk/agentic-sdlc-spec-kit/tree/main/extensions/evals"

requires:
  speckit_version: ">=0.0.80"
  tools:
    - name: "git"
      required: true
      version: ">=2.0.0"
    - name: "promptfoo"
      required: false
      version: ">=0.60.0"
      description: "Required for PromptFoo integration"
    - name: "deepeval"
      required: false
      version: ">=3.0.0"
      description: "Required for DeepEval integration (v3.x API)"

provides:
  commands:
    # Initialize evals directory structure (brownfield/greenfield)
    - name: "adlc.evals.init"
      file: "commands/init.md"
      description: "Initialize evals/{system}/ directory (brownfield: scan existing tests; greenfield: create structure)"
      aliases: ["evals.init"]

    # Extract eval criteria from spec + error analysis
    - name: "adlc.evals.specify"
      file: "commands/specify.md"
      description: "Extract eval criteria from feature spec + error analysis → drafts/ (includes quantification + saturation)"
      aliases: ["evals.specify"]

    # Resolve ambiguities via axial coding
    - name: "adlc.evals.clarify"
      file: "commands/clarify.md"
      description: "Resolve ambiguities via axial coding → accept drafts → goldset.md + goldset.json"
      aliases: ["evals.clarify"]

    # Generate eval config + graders + test files (PromptFoo/DeepEval)
    - name: "adlc.evals.implement"
      file: "commands/implement.md"
      description: "Generate eval config + graders + test files from goldset (PromptFoo/DeepEval)"
      aliases: ["evals.implement"]

    # Run evals and validate results
    - name: "adlc.evals.validate"
      file: "commands/validate.md"
      description: "Run evals and validate results (TPR/TNR + goldset quality + pass rate thresholds)"
      aliases: ["evals.validate"]

    # Generate execution traces + analysis reports
    - name: "adlc.evals.trace"
      file: "commands/trace.md"
      description: "Generate execution traces + analysis reports from evals/results/ → optional PR to team-ai-directives"
      aliases: ["evals.trace"]

  config:
    - name: "evals-config.yml"
      template: "config-template.yml"
      description: "Evals extension configuration"
      required: false

# Handoffs between commands (follows levelup/architect pattern)
handoffs:
  evals.init:
    - label: "Extract Eval Criteria"
      agent: "evals.specify"
      prompt: "Extract eval criteria from feature spec and error analysis"
      send: true

  evals.specify:
    - label: "Clarify Eval Criteria"
      agent: "evals.clarify"
      prompt: "Resolve ambiguities via axial coding and accept drafts"
      send: true

  evals.clarify:
    - label: "Implement Evaluators"
      agent: "evals.implement"
      prompt: "Generate eval config and graders from finalized goldset"
      send: true

  evals.implement:
    - label: "Validate Eval System"
      agent: "evals.validate"
      prompt: "Run evals and validate results (TPR/TNR + quality thresholds)"
      send: true

  evals.validate:
    - label: "Generate Traces"
      agent: "evals.trace"
      prompt: "Generate execution traces and analysis reports from results"
      send: false

tags:
   - "evaluation"
   - "edd"
   - "eval-driven-development"
   - "promptfoo"
   - "deepeval"
   - "testing"
   - "quality"
   - "goldset"
   - "binary-pass-fail"
   - "error-analysis"

# Integration points
# - Task creation automatically matches evals to tasks via [EVAL] markers
# - All commands are manual, no hooks required

defaults:
  system: "promptfoo"  # promptfoo | deepeval | custom | llm-judge

  # File locations
  drafts_location: ".specify/drafts/"
  goldset_location: "evals/{system}/goldset.md"
  config_location: "evals/{system}/config.yml"

  # EDD Principle settings
  evaluation_pyramid:
    tier1_fast_checks: true     # Security baseline + deterministic graders
    tier2_goldset_judges: true  # LLM judges on version-controlled goldset

  binary_pass_fail: true       # EDD Principle II: No Likert scales

  # Error analysis settings
  error_analysis:
    theoretical_saturation_required: true
    min_traces_analyzed: 20

  # Test data hygiene (EDD Principle IX)
  test_data:
    adversarial_required: true
    holdout_ratio: 0.2

  # Annotation integration
  annotation:
    high_risk_routing: true
    binary_human_review: true

# Goldset Lifecycle (follows levelup/architect pattern):
# 1. init → initialize directory structure (brownfield/greenfield)
# 2. specify → extract criteria from spec + error analysis (drafts)
# 3. clarify → resolve ambiguities (goldset.md + goldset.json)
# 4. implement → generate eval config + graders (choose PromptFoo/DeepEval)
# 5. validate → run evals + TPR/TNR + quality thresholds
# 6. trace → generate traces + analysis reports + optional PR
#
# Integration: Task creation automatically adds [EVAL] markers