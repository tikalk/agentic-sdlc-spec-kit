# Architect Extension Configuration
# Copy to .specify/extensions/architect/architect-config.yml to customize

adr:
  # ADR generation heuristic
  # surprising: Only document surprising/non-obvious decisions (default)
  # all: Document all architectural decisions
  # minimal: Only document critical decisions
  heuristic: "surprising"
  
  # System-level ADR file location
  location: ".specify/drafts/adr.md"

ad:
  # Architecture Description file location
  location: "AD.md"
  
  # Team-ai-directives output (when configured)
  team_location: "AD.md"
  team_pr: true  # Create PR to team-ai-directives when configured

views:
  # Default views to generate
  # core: Context, Functional, Information, Development, Deployment (5 views)
  # all: All 7 views including Concurrency and Operational
  # Or comma-separated: "concurrency,operational"
  default: "core"

analysis:
  # Maximum findings to report (overflow is summarized)
  max_findings: 50
  
  # Severity thresholds for blocking
  block_on_critical: true
  block_on_high: false
