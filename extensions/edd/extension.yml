schema_version: "1.0"

extension:
  id: "edd"
  name: "EDD — Evaluation-Driven Development"
  version: "1.1.0"
  description: "Verification partner for converge: deterministic checks (lint, tests, smoke) + AI-driven evaluation (oracle adequacy, evidence mapping). Appends actionable verification gaps as tasks to tasks.md, writes next-spec.md for spec-level corrections, and fills EDD evidence sections in converge's verify.md. Enables loop-driven development."
  author: "Agentic SDLC Team"
  repository: "https://github.com/tikalk/agentic-sdlc-spec-kit"
  license: "MIT"
  homepage: "https://github.com/tikalk/agentic-sdlc-spec-kit/tree/main/extensions/edd"

requires:
  speckit_version: ">=0.10.0"
  tools:
    - name: "git"
      required: true

provides:
  commands:
    - name: "adlc.edd.verify"
      file: "commands/verify.md"
      description: "Run deterministic + AI evaluation, grade gates, append tasks, update verify.md, write evidence.md + loop-state.yml + next-spec.md"
      aliases: ["edd.verify"]

  config:
    - name: "edd-config.yml"
      template: "config-template.yml"
      description: "EDD extension configuration"
      required: false

hooks:
  after_converge:
    command: "adlc.edd.verify"
    optional: false
    description: "Deep evaluation after convergence — deterministic + AI checks against Mission Brief"

tags:
  - "evaluation"
  - "verify"
  - "grading"
  - "quality-gates"
  - "loop-driven"
  - "deterministic"
  - "evidence"

defaults:
  edd:
    oracle_adequacy_threshold: 80
    max_criticals: 0
    max_highs: 0
    max_iterations: 5
