schema_version: "1.0"

extension:
  id: "workflow"
  name: "Workflow Factory — Mission-Driven SDLC Automation"
  version: "2.6.1"
  description: "Mission-driven SDLC automation: plan a workflow YAML (/workflow.mission), execute it (/workflow.run), resume interrupted runs (/workflow.resume), and persist them (/workflow.persist). Supports spec/change/quick routing, per-step model selection, cross-session resume, and draft persistence. Optional phases are user-gated at runtime; each route uses commands from a single preset."
  author: "Agentic SDLC Team"
  repository: "https://github.com/tikalk/agentic-sdlc-spec-kit"
  license: "MIT"
  homepage: "https://github.com/tikalk/agentic-sdlc-spec-kit/tree/main/extensions/workflow"

requires:
  speckit_version: ">=0.8.5"

provides:
  commands:
    - name: "adlc.workflow.mission"
      file: "commands/adlc.workflow.mission.md"
      description: "Assess prompt, generate a workflow YAML, and delegate to /workflow.run. Handles spec correction routing."
      aliases: ["workflow.mission"]

    - name: "adlc.workflow.run"
      file: "commands/adlc.workflow.run.md"
      description: "Execute a workflow YAML by walking its steps list. Manages .mission-state.json for resume."
      aliases: ["workflow.run"]

    - name: "adlc.workflow.resume"
      file: "commands/adlc.workflow.resume.md"
      description: "Resume an interrupted workflow — delegates to /workflow.run for agent-orchestrated missions, or specify workflow resume for engine runs."
      aliases: ["workflow.resume"]

    - name: "adlc.workflow.persist"
      file: "commands/adlc.workflow.persist.md"
      description: "Make current feature's most recent run workflow permanent and register it."
      aliases: ["workflow.persist"]

  config:
    - name: "workflow-config.yml"
      template: "config-template.yml"
      description: "Workflow iteration budgets, spec correction cap, and model tiers"
      required: false

tags:
  - "workflow-factory"
  - "automation"
  - "mission-driven"
  - "converge"
  - "sdd"

defaults:
  workflow:
    max_iterations: 5
    max_spec_corrections: 2
    supervision: "gated"
    circuit_breaker: 3
