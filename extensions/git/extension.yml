schema_version: "1.0"

extension:
  id: git
  name: "Git Branching Workflow"
  version: "1.5.0"
  description: "Feature branch creation, numbering (sequential/timestamp), validation, Git remote detection, multi-repo workspace submodule management, feature-level worktree isolation, and DAG-aware task execution"
  author: spec-kit-core
  repository: https://github.com/github/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: git
      required: false

provides:
  commands:
    - name: speckit.git.feature
      file: commands/speckit.git.feature.md
      aliases: ["git.feature"]
      description: "Create a feature branch with sequential or timestamp numbering, optionally isolated in a worktree"
    - name: speckit.git.validate
      file: commands/speckit.git.validate.md
      aliases: ["git.validate"]
      description: "Validate current branch follows feature branch naming conventions"
    - name: speckit.git.remote
      file: commands/speckit.git.remote.md
      aliases: ["git.remote"]
      description: "Detect Git remote URL for GitHub integration"
    - name: speckit.git.initialize
      file: commands/speckit.git.initialize.md
      aliases: ["git.initialize"]
      description: "Initialize a Git repository with an initial commit"
    - name: speckit.git.commit
      file: commands/speckit.git.commit.md
      aliases: ["git.commit"]
      description: "Auto-commit changes after a Spec Kit command completes"
    - name: speckit.git.workspace
      file: commands/speckit.git.workspace.md
      aliases: ["git.workspace"]
      description: "Register child repositories as Git submodules for multi-repo workspace coordination"
    - name: speckit.git.setup-ignore
      file: commands/speckit.git.setup-ignore.md
      aliases: ["git.setup-ignore"]
      description: "Configure .gitignore with proper rules for Spec Kit directories"
    - name: speckit.git.task
      file: commands/speckit.git.task.md
      aliases: ["git.task"]
      description: "Execute a single task on an isolated task branch within a feature worktree (worktree mode only)"
    - name: speckit.git.task-merge
      file: commands/speckit.git.task-merge.md
      aliases: ["git.task-merge"]
      description: "Merge a completed task branch back into the feature branch (worktree mode only)"
    - name: speckit.git.task-list
      file: commands/speckit.git.task-list.md
      aliases: ["git.task-list"]
      description: "List active task branches in the current feature worktree (worktree mode only)"

  config:
    - name: "git-config.yml"
      template: "config-template.yml"
      description: "Git branching, worktree, and task-execution configuration"
      required: false

hooks:
  before_constitution:
    command: speckit.git.initialize
    optional: false
    description: "Initialize Git repository before constitution setup"
  before_specify:
    command: speckit.git.feature
    optional: false
    description: "Create feature branch before specification"
  before_clarify:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before clarification?"
    description: "Auto-commit before spec clarification"
  before_plan:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before planning?"
    description: "Auto-commit before implementation planning"
  before_tasks:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before task generation?"
    description: "Auto-commit before task generation"
  before_implement:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before implementation?"
    description: "Auto-commit before implementation"
  before_checklist:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before checklist?"
    description: "Auto-commit before checklist generation"
  before_analyze:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before analysis?"
    description: "Auto-commit before analysis"
  before_taskstoissues:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before issue sync?"
    description: "Auto-commit before tasks-to-issues conversion"
  after_constitution:
    command: speckit.git.commit
    optional: true
    prompt: "Commit constitution changes?"
    description: "Auto-commit after constitution update"
  after_specify:
    command: speckit.git.commit
    optional: true
    prompt: "Commit specification changes?"
    description: "Auto-commit after specification"
  after_clarify:
    command: speckit.git.commit
    optional: true
    prompt: "Commit clarification changes?"
    description: "Auto-commit after spec clarification"
  after_plan:
    command: speckit.git.commit
    optional: true
    prompt: "Commit plan changes?"
    description: "Auto-commit after implementation planning"
  after_tasks:
    command: speckit.git.commit
    optional: true
    prompt: "Commit task changes?"
    description: "Auto-commit after task generation"
  after_implement:
    command: speckit.git.commit
    optional: true
    prompt: "Commit implementation changes?"
    description: "Auto-commit after implementation"
  after_checklist:
    command: speckit.git.commit
    optional: true
    prompt: "Commit checklist changes?"
    description: "Auto-commit after checklist generation"
  after_analyze:
    command: speckit.git.commit
    optional: true
    prompt: "Commit analysis results?"
    description: "Auto-commit after analysis"
  after_taskstoissues:
    command: speckit.git.commit
    optional: true
    prompt: "Commit after syncing issues?"
    description: "Auto-commit after tasks-to-issues conversion"
  before_task_execute:
    command: speckit.git.commit
    optional: true
    prompt: "Commit outstanding changes before task?"
    description: "Auto-commit before each individual task execution"
  after_task_execute:
    command: speckit.git.commit
    optional: true
    prompt: "Commit task changes?"
    description: "Auto-commit after each individual task execution"

tags:
  - "git"
  - "branching"
  - "workflow"

config:
  defaults:
    branch_numbering: sequential
    init_commit_message: "[Spec Kit] Initial commit"
