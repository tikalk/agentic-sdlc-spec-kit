# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "[Spec Kit] Initial commit"

# Optional custom feature branch naming.
#
# Supported placeholders:
#   {prefix}    One allowed prefix (for example: feat, fix, docs)
#   {number}    Sequential feature number using number_padding
#   {timestamp} Timestamp in YYYYMMDD-HHMMSS format
#   {issue}     Issue key whose format is controlled by issue_format
#   {slug}      Kebab-cased feature slug
#
# Rules:
# - template must include {slug}
# - template must include exactly one of {number} or {timestamp}
# - if template includes {prefix}, allowed_prefixes must be non-empty
# - if template includes {issue}, callers must supply --issue / GIT_BRANCH_ISSUE
# - issue_format: jira -> PROJ-123, numeric -> 1234
branch_pattern:
  enabled: false
  template: "{prefix}/{number}-{issue}-{slug}"
  allowed_prefixes:
    - feat
  number_padding: 3
  issue_format: jira

# Feature isolation mode. Controls whether `git.feature` creates a normal
# feature branch (existing behavior) or provisions a feature-level worktree
# at .worktrees/<feature>/. Valid values: "branch" (default), "worktree".
#
# Overridable per-invocation via:
#   - --worktree / -Worktree (Bash / PowerShell)
#   - --branch-mode / -BranchMode
#   - --isolation-mode <branch|worktree> / -IsolationMode <branch|worktree>
#   - SPECIFY_ISOLATION_MODE environment variable
isolation_mode: branch

# Worktree layout (only used when isolation_mode = worktree).
# base_dir is relative to the repo root. manifest_filename is the
# provenance-tracked file written into each worktree (gitignored by default
# via `git.setup-ignore`).
worktrees:
  base_dir: .worktrees
  manifest_filename: git.worktree-manifest.json
  # Pattern for per-task branches created under a feature worktree.
  # Substitutions: {feature} = feature branch name, {id} = task id with
  # leading 'T' stripped (T007 -> 7), {task-slug} = kebab-cased task title.
  task_branch_pattern: "{feature}--task-{id}-{task-slug}"

# Task execution (consumed by adlc.spec.implement and the `git.task*` commands).
task_execution:
  # Default execution mode when no other signal is present.
  #   "sync"    = one task at a time, single branch (works in both branch
  #               and worktree mode; the canonical mode for sequential work).
  #   "parallel"= tasks may run concurrently on separate task branches in
  #               the same feature worktree; adlc.spec.implement dispatches
  #               [P] tasks via subagents.
  #   "async"   = like parallel but the calling agent does not wait for
  #               completion; results are reconciled on the next pass.
  default_mode: sync
  # Below this wave size, the implementer runs tasks sequentially even if
  # the DAG would permit parallelism. Keeps small features snappy.
  parallel_threshold_wave_size: 2
  # When true, the implementer aborts the feature branch on merge conflict
  # and delegates resolution to a subagent. When false, conflicts are
  # surfaced to the user.
  delegate_merge_conflicts: true

# Task generation (consumed by the `tasks` template and tasks-dag.{sh,ps1}).
task_generation:
  # Default parallel-marker for tasks that touch different files within
  # the same story. Set false if the codebase requires strict sequential
  # execution (e.g., single-file changes only).
  parallel_marker_default: true
  # Coalesce consecutive simple tasks (per the spec.tasks decomposition
  # rules) into a single task when both are < 10 lines and touch the same
  # file. Set true to enforce the "max 8 tasks per story" guideline.
  coalesce_simple_tasks: true
  # Maximum number of tasks generated per user story. The tasks template
  # will warn (not error) when a story exceeds this threshold.
  max_tasks_per_story: 8

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "[Spec Kit] Save progress before clarification"
  before_plan:
    enabled: false
    message: "[Spec Kit] Save progress before planning"
  before_tasks:
    enabled: false
    message: "[Spec Kit] Save progress before task generation"
  before_implement:
    enabled: false
    message: "[Spec Kit] Save progress before implementation"
  before_checklist:
    enabled: false
    message: "[Spec Kit] Save progress before checklist"
  before_analyze:
    enabled: false
    message: "[Spec Kit] Save progress before analysis"
  before_taskstoissues:
    enabled: false
    message: "[Spec Kit] Save progress before issue sync"
  after_constitution:
    enabled: false
    message: "[Spec Kit] Add project constitution"
  after_specify:
    enabled: false
    message: "[Spec Kit] Add specification"
  after_clarify:
    enabled: false
    message: "[Spec Kit] Clarify specification"
  after_plan:
    enabled: false
    message: "[Spec Kit] Add implementation plan"
  after_tasks:
    enabled: false
    message: "[Spec Kit] Add tasks"
  after_implement:
    enabled: false
    message: "[Spec Kit] Implementation progress"
  after_checklist:
    enabled: false
    message: "[Spec Kit] Add checklist"
  after_analyze:
    enabled: false
    message: "[Spec Kit] Add analysis report"
  after_taskstoissues:
    enabled: false
    message: "[Spec Kit] Sync tasks to issues"
  before_task_execute:
    enabled: false
    message: "[Spec Kit] Save progress before task"
  after_task_execute:
    enabled: false
    message: "[Spec Kit] Task checkpoint"
