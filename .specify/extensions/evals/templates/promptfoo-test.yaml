# PromptFoo Test Template
# EDD-compliant evaluation configuration template
# Use this template to generate system-specific PromptFoo configurations

# Template variables (replace during generation):
# {{SYSTEM}} - evaluation system (promptfoo, custom, llm-judge)
# {{CRITERION_ID}} - goldset criterion ID (eval-001, eval-002, etc.)
# {{CRITERION_NAME}} - human-readable criterion name
# {{GRADER_FILE}} - grader script filename
# {{FAILURE_TYPE}} - specification_failure | generalization_failure
# {{TIER}} - 1 (fast) | 2 (semantic) | hybrid
# {{EVALUATOR_TYPE}} - code-based | llm-judge | hybrid

description: "{{CRITERION_NAME}} - EDD Binary Pass/Fail Evaluation"

# EDD Principle IV: Evaluation Pyramid Configuration
metadata:
  criterion_id: "{{CRITERION_ID}}"
  criterion_name: "{{CRITERION_NAME}}"
  tier: {{TIER}}
  evaluator_type: "{{EVALUATOR_TYPE}}"
  failure_type: "{{FAILURE_TYPE}}"
  edd_compliant: true
  binary_only: true
  generated_from: "goldset-v1.0.0"

# Test configuration for single criterion
tests:
  - description: "{{CRITERION_NAME}} Validation"

    # EDD Principle II: Binary pass/fail assertion
    assert:
      - type: python
        value: "./graders/{{GRADER_FILE}}"

        # Binary scoring configuration
        transform: |
          if (typeof output === 'object' && 'pass' in output) {
            return {
              pass: output.pass === true,
              score: output.pass ? 1.0 : 0.0,
              reason: output.reason || 'No reason provided',
              binary: true
            };
          }

          // Fallback for non-structured output (should not happen in EDD)
          return {
            pass: false,
            score: 0.0,
            reason: 'Invalid grader output format - must return structured JSON',
            binary: true,
            error: 'grader_format_error'
          };

    # Metadata for this specific test
    metadata:
      criterion: "{{CRITERION_ID}}"
      tier: {{TIER}}
      priority: "{{#if_specification_failure}}critical{{else}}normal{{/if_specification_failure}}"

      # EDD Principle VIII: Failure type routing
      routing:
        failure_type: "{{FAILURE_TYPE}}"
        action: "{{#if_specification_failure}}fix_directive{{else}}build_evaluator{{/if_specification_failure}}"

      # Performance expectations
      performance:
        max_execution_time: "{{#if_tier1}}30s{{else}}300s{{/if_tier1}}"
        expected_accuracy: ">90%"

      # EDD Principle VII: Annotation routing
      annotation:
        high_risk_threshold: 0.8
        route_to: "{{#if_specification_failure}}security_review{{else}}quality_review{{/if_specification_failure}}"

# Test data configuration (references goldset examples)
vars:
  # Pass examples from goldset
  pass_examples:
    - input: "{{PASS_EXAMPLE_1_INPUT}}"
      expected_output: "{{PASS_EXAMPLE_1_OUTPUT}}"
      context: "{{PASS_EXAMPLE_1_CONTEXT}}"

    - input: "{{PASS_EXAMPLE_2_INPUT}}"
      expected_output: "{{PASS_EXAMPLE_2_OUTPUT}}"
      context: "{{PASS_EXAMPLE_2_CONTEXT}}"

  # Fail examples from goldset
  fail_examples:
    - input: "{{FAIL_EXAMPLE_1_INPUT}}"
      expected_output: "{{FAIL_EXAMPLE_1_OUTPUT}}"
      context: "{{FAIL_EXAMPLE_1_CONTEXT}}"

    - input: "{{FAIL_EXAMPLE_2_INPUT}}"
      expected_output: "{{FAIL_EXAMPLE_2_OUTPUT}}"
      context: "{{FAIL_EXAMPLE_2_CONTEXT}}"

  # Adversarial examples (from analyze phase)
  adversarial_examples:
    - input: "{{ADVERSARIAL_1_INPUT}}"
      expected: "fail"
      attack_vector: "{{ADVERSARIAL_1_VECTOR}}"

    - input: "{{ADVERSARIAL_2_INPUT}}"
      expected: "fail"
      attack_vector: "{{ADVERSARIAL_2_VECTOR}}"

# Output configuration
outputPath: "../results/{{CRITERION_ID}}_results.json"

# EDD Principle V: Trajectory observability
writeLatestResults: true
share: false  # Keep results private

# EDD Principle IX: Test data versioning
dataset:
  version: "1.0.0"
  source: "goldset.md"
  examples_total: "{{TOTAL_EXAMPLES}}"
  pass_examples: "{{PASS_EXAMPLE_COUNT}}"
  fail_examples: "{{FAIL_EXAMPLE_COUNT}}"
  adversarial_examples: "{{ADVERSARIAL_EXAMPLE_COUNT}}"

# Post-processing for failure routing
postprocess:
  # EDD Principle VIII: Route failures appropriately
  on_failure:
    specification_failure:
      action: "generate_fix_directive"
      template: "../templates/fix-directive.md"
      output_path: "../results/fix_directives/{{CRITERION_ID}}.md"

    generalization_failure:
      action: "add_to_evaluator_backlog"
      template: "../templates/evaluator-backlog.md"
      output_path: "../results/evaluator_backlog/{{CRITERION_ID}}.md"

  # EDD Principle VII: Annotation queue routing
  annotation_routing:
    enabled: true
    risk_threshold: 0.8
    queue_assignment:
      specification_failure: "security_review_queue"
      generalization_failure: "quality_review_queue"
    metadata:
      include_context: true
      include_goldset_examples: true
      binary_review_only: true

# Integration hooks
hooks:
  # Before evaluation
  before:
    - command: "python scripts/validate_grader.py {{GRADER_FILE}}"
      description: "Validate grader binary compliance"

    - command: "python scripts/check_goldset_sync.py {{CRITERION_ID}}"
      description: "Verify goldset synchronization"

  # After evaluation
  after:
    - command: "python scripts/route_failures.py {{CRITERION_ID}}"
      description: "Route failures according to EDD Principle VIII"

    - command: "python scripts/update_metrics.py {{CRITERION_ID}}"
      description: "Update evaluation metrics and dashboards"

# Environment configuration
env:
  # LLM API configuration (for LLM-judge evaluators)
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  OPENAI_MODEL: "gpt-4"
  OPENAI_TEMPERATURE: "0.1"  # Low temperature for consistent evaluation

  # EDD configuration
  EDD_BINARY_ONLY: "true"
  EDD_TIER_SLA_TIER1: "30"     # seconds
  EDD_TIER_SLA_TIER2: "300"    # seconds
  EDD_ANNOTATION_THRESHOLD: "0.8"

# Parallel execution configuration
parallelism:
  # Tier 1: Can run in parallel for speed
  tier1: 4

  # Tier 2: Limited parallel for LLM API rate limits
  tier2: 2

# Error handling and retry configuration
retry:
  # Retry failed evaluations (especially for LLM API errors)
  enabled: true
  max_attempts: 3
  backoff: "exponential"

  # Only retry on specific error types
  retry_on:
    - "api_error"
    - "timeout"
    - "rate_limit"

  # Never retry on evaluation logic errors
  never_retry_on:
    - "grader_format_error"
    - "binary_compliance_violation"

# Reporting configuration
reports:
  # EDD-compliant reporting format
  format: "json"

  # Include EDD metadata in reports
  include:
    - tier_performance
    - binary_compliance_check
    - failure_type_distribution
    - annotation_queue_stats

  # Output locations
  summary_path: "../results/{{CRITERION_ID}}_summary.json"
  detailed_path: "../results/{{CRITERION_ID}}_detailed.json"

# Validation rules
validation:
  # Ensure binary compliance
  binary_outputs_only: true

  # Verify grader metadata
  required_metadata:
    - "criterion"
    - "evaluator_type"
    - "tier"
    - "binary"

  # Performance validation
  performance_checks:
    tier1_max_time: 30      # seconds
    tier2_max_time: 300     # seconds
    min_accuracy: 0.90      # 90% accuracy requirement