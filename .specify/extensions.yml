installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  - extension: product
    command: adlc.product.link
    enabled: true
    optional: true
    prompt: Execute adlc.product.link?
    description: Link feature to existing PDR (silent if no PDRs exist)
    condition: null
  - extension: team-ai-directives
    command: adlc.team-ai-directives.discover
    enabled: true
    optional: false
    prompt: Execute adlc.team-ai-directives.discover?
    description: Auto-discover personas, rules, and examples from team-ai-directives
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  - extension: architect
    command: adlc.architect.validate
    enabled: true
    optional: true
    prompt: Execute adlc.architect.validate?
    description: Validate feature aligns with architecture; escalate if new architectural
      decisions detected
    condition: null
  - extension: team-ai-directives
    command: adlc.team-ai-directives.discover
    enabled: true
    optional: false
    prompt: Execute adlc.team-ai-directives.discover?
    description: Auto-discover architecture patterns and implementation guidelines
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: tdd
    command: adlc.tdd.implement
    enabled: true
    optional: false
    prompt: Execute adlc.tdd.implement?
    description: Execute RED→GREEN→REFACTOR TDD cycle before implementation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  - extension: product
    command: adlc.product.validate
    enabled: true
    optional: true
    prompt: Execute adlc.product.validate?
    description: Validate feature spec alignment with PRD (READ-ONLY)
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  - extension: tdd
    command: adlc.tdd.plan
    enabled: true
    optional: true
    prompt: Execute adlc.tdd.plan?
    description: TDD planning phase - answer 5 questions about interface, behaviors,
      and testability
    condition: null
  - extension: architect
    command: adlc.architect.validate
    enabled: true
    optional: true
    prompt: Execute adlc.architect.validate?
    description: Validate plan alignment with architecture (READ-ONLY)
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: tdd
    command: adlc.tdd.tasks
    enabled: true
    optional: false
    prompt: Execute adlc.tdd.tasks?
    description: Generate hybrid TDD tests after tasks.md created
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: tdd
    command: adlc.tdd.validate
    enabled: true
    optional: true
    prompt: Execute adlc.tdd.validate?
    description: 'Validate test quality: coverage, isolation, anti-patterns'
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
