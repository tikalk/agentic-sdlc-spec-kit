services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-dev
    ports:
      - "9000:3000"
    volumes:
      - ..:/workspace
    environment:
      - NODE_ENV=development
      - OPENCODE_PORT=3000
      - OPENCODE_LOG_LEVEL=${OPENCODE_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/global/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped
